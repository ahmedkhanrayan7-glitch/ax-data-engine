version: "3.9"

# ─────────────────────────────────────────────────────────────────
# AX Decision Intelligence Engine — Production Infrastructure
# ─────────────────────────────────────────────────────────────────

services:

  # ── API Server ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: ax_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ax_user:ax_pass@postgres:5432/ax_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SENTRY_DSN=${SENTRY_DSN:-}
      - PROXY_POOL_URL=${PROXY_POOL_URL:-}
      - CAPTCHA_API_KEY=${CAPTCHA_API_KEY:-}
      - LOG_LEVEL=INFO
      - WORKERS=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ax_engine:/app/ax_engine
    networks:
      - ax_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Workers (scalable) ───────────────────────────────────
  worker_discovery:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: ax_worker_discovery
    command: celery -A ax_engine.workers.celery_app worker -Q discovery -c 4 --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://ax_user:ax_pass@postgres:5432/ax_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PROXY_POOL_URL=${PROXY_POOL_URL:-}
    depends_on:
      - postgres
      - redis
    networks:
      - ax_net
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G

  worker_enrichment:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: ax_worker_enrichment
    command: celery -A ax_engine.workers.celery_app worker -Q enrichment -c 4 --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://ax_user:ax_pass@postgres:5432/ax_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    networks:
      - ax_net
    restart: unless-stopped

  worker_crawl:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: ax_worker_crawl
    command: celery -A ax_engine.workers.celery_app worker -Q crawl -c 2 --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://ax_user:ax_pass@postgres:5432/ax_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PROXY_POOL_URL=${PROXY_POOL_URL:-}
    depends_on:
      - postgres
      - redis
    networks:
      - ax_net
    restart: unless-stopped

  # ── Celery Beat (scheduled jobs) ────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: ax_celery_beat
    command: celery -A ax_engine.workers.celery_app beat --loglevel=info
    depends_on:
      - redis
    networks:
      - ax_net
    restart: unless-stopped

  # ── Flower (Celery monitoring UI) ───────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: ax_flower
    command: celery -A ax_engine.workers.celery_app flower --port=5555 --broker=redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - ax_net
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ax_postgres
    environment:
      POSTGRES_USER: ax_user
      POSTGRES_PASSWORD: ax_pass
      POSTGRES_DB: ax_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./ax_engine/database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - ax_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ax_user -d ax_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ax_redis
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ax_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ax_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ax_net
    restart: unless-stopped

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ax_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=ax_admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - ax_net
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ax_net:
    driver: bridge
